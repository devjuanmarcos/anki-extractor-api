services:
  postgres:
    image: postgres:16-alpine
    container_name: margoni-hot-localhost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: margoni_hot_localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - margoni_hot_localhost_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d margoni_hot_localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  margoni_hot_localhost_pgdata:
